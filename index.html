            height: 50px;

<body>
    <div class="container">
        <!-- 开始页面 -->

            <h1>🐾 MBTI属相测试 🐾</h1>
            <p>回答以下12个问题，找到属于你的动物人格！（趣味测试，仅供娱乐）详情咨询wechat：13162761914（原创版权所有者）</p>

                animal: "豹子",
                icon: "🐆",
                description: "你是敏捷的豹子型人格（ESTP）。你勇敢、果断、喜欢冒险，擅长把握当下的机会。你适应能力极强，能在压力下快速做出决策，是天生的行动派。"
            }
        ];

        // 3. 全局变量
        let currentQuestionIndex = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        // 4. DOM元素
        const startBtn = document.getElementById('startBtn');
        const testScreen = document.getElementById('testScreen');
        const loadingScreen = document.getElementById('loadingScreen');
        const resultScreen = document.getElementById('resultScreen');
        const progress = document.getElementById('progress');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const animalIcon = document.getElementById('animalIcon');
        const animalName = document.getElementById('animalName');
        const mbtiType = document.getElementById('mbtiType');
        const traitDesc = document.getElementById('traitDesc');
        const restartBtn = document.getElementById('restartBtn');
        
        // 历史记录相关DOM元素
        const historyBtn = document.getElementById('historyBtn');
        const resultHistoryBtn = document.getElementById('resultHistoryBtn');
        const historyScreen = document.getElementById('historyScreen');
        const historyList = document.getElementById('historyList');
        const backBtn = document.getElementById('backBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        
        // 导出相关DOM元素
        const homeExportBtn = document.getElementById('homeExportBtn');
        const resultExportBtn = document.getElementById('resultExportBtn');
        const exportHistoryBtn = document.getElementById('exportHistoryBtn');
        const exportModal = document.getElementById('exportModal');
        const exportXlsxBtn = document.getElementById('exportXlsxBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const cancelExportBtn = document.getElementById('cancelExportBtn');

        // 5. 初始化测试
        startBtn.addEventListener('click', startTest);
        restartBtn.addEventListener('click', restartTest);
        // 历史记录按钮事件
        historyBtn.addEventListener('click', showHistory);
        resultHistoryBtn.addEventListener('click', showHistory);
        backBtn.addEventListener('click', backToHome);
        clearHistoryBtn.addEventListener('click', clearHistory);
        // 导出按钮事件（打开选择弹窗）
        homeExportBtn.addEventListener('click', openExportModal);
        resultExportBtn.addEventListener('click', openExportModal);
        exportHistoryBtn.addEventListener('click', openExportModal);
        // 导出格式选择事件
        exportXlsxBtn.addEventListener('click', () => exportHistory('xlsx'));
        exportCsvBtn.addEventListener('click', () => exportHistory('csv'));
        cancelExportBtn.addEventListener('click', closeExportModal);

        // 6. 开始测试
        function startTest() {
            document.querySelector('.start-screen').style.display = 'none';
            testScreen.style.display = 'block';
            currentQuestionIndex = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            showQuestion();
        }

        // 7. 显示当前问题
        function showQuestion() {
            const question = questions[currentQuestionIndex];
            progress.textContent = `问题 ${currentQuestionIndex + 1}/${questions.length}`;
            questionText.textContent = question.text;
            
            // 清空选项容器
            optionsContainer.innerHTML = '';
            
            // 创建选项按钮
            question.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.addEventListener('click', () => selectOption(option.score));
                optionsContainer.appendChild(btn);
            });
        }

        // 8. 选择选项并计分
        function selectOption(score) {
            // 累加分数
            for (const key in score) {
                scores[key] += score[key];
            }

            // 进入下一题或计算结果
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                // 显示加载动画
                testScreen.style.display = 'none';
                loadingScreen.style.display = 'block';
                
                // 模拟计算延迟，提升体验
                setTimeout(calculateResult, 1500);
            }
        }

        // 9. 计算MBTI结果并匹配动物
        function calculateResult() {
            // 计算每个维度的结果
            const EorI = scores.E >= scores.I ? 'E' : 'I';
            const SorN = scores.S >= scores.N ? 'S' : 'N';
            const TorF = scores.T >= scores.F ? 'T' : 'F';
            const JorP = scores.J >= scores.P ? 'J' : 'P';
            const finalMbti = EorI + SorN + TorF + JorP;

            // 匹配对应的动物
            const matchedAnimal = animalMbtiMap.find(item => item.mbti === finalMbti);

            // 显示结果
            loadingScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            animalIcon.textContent = matchedAnimal.icon;
            animalName.textContent = matchedAnimal.animal;
            mbtiType.textContent = `MBTI类型：${finalMbti}`;
            traitDesc.textContent = matchedAnimal.description;

            // 保存测试结果到本地存储
            saveTestResult(finalMbti, matchedAnimal);
        }

        // 10. 重新测试
        function restartTest() {
            resultScreen.style.display = 'none';
            startTest();
        }

        // 保存测试结果到localStorage
        function saveTestResult(mbti, animalData) {
            // 构造记录数据
            const testResult = {
                id: Date.now(), // 唯一标识（时间戳）
                date: new Date().toLocaleString('zh-CN'), // 测试时间（本地化格式）
                mbti: mbti,
                animal: animalData.animal,
                icon: animalData.icon,
                description: animalData.description
            };

            // 从本地存储获取已有记录
            let history = JSON.parse(localStorage.getItem('mbtiTestHistory')) || [];
            // 添加新记录（最多保留10条）
            history.unshift(testResult);
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
            // 保存回本地存储
            localStorage.setItem('mbtiTestHistory', JSON.stringify(history));
        }

        // 显示历史记录
        function showHistory() {
            // 隐藏其他页面，显示历史记录页面
            document.querySelector('.start-screen').style.display = 'none';
            testScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            loadingScreen.style.display = 'none';
            historyScreen.style.display = 'block';

            // 加载并渲染历史记录
            renderHistory();
        }

        // 渲染历史记录列表
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('mbtiTestHistory')) || [];
            
            if (history.length === 0) {
                // 无记录时显示提示
                historyList.innerHTML = '<div class="empty-history">暂无测试记录，快去完成一次测试吧！🐾</div>';
                return;
            }

            // 渲染记录列表
            historyList.innerHTML = '';
            history.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-date">测试时间：${item.date}</div>
                    <div class="history-content">
                        <div class="history-icon">${item.icon}</div>
                        <div class="history-info">
                            <div class="history-mbti">${item.mbti}</div>
                            <div class="history-animal">${item.animal}</div>
                        </div>
                    </div>
                `;
                historyList.appendChild(historyItem);
            });
        }

        // 返回首页
        function backToHome() {
            historyScreen.style.display = 'none';
            document.querySelector('.start-screen').style.display = 'block';
        }

        // 清空历史记录
        function clearHistory() {
            if (confirm('确定要清空所有测试记录吗？此操作不可恢复！')) {
                localStorage.removeItem('mbtiTestHistory');
                renderHistory(); // 重新渲染空列表
            }
        }

        // 新增：打开导出格式选择弹窗
        function openExportModal() {
            exportModal.style.display = 'flex';
        }

        // 新增：关闭导出格式选择弹窗
        function closeExportModal() {
            exportModal.style.display = 'none';
        }

        // 核心：导出历史记录（支持xlsx/csv双格式）
        function exportHistory(format) {
            // 关闭弹窗
            closeExportModal();
            
            // 获取历史记录
            const history = JSON.parse(localStorage.getItem('mbtiTestHistory')) || [];
            
            // 无记录时提示
            if (history.length === 0) {
                alert('暂无测试记录可导出！');
                return;
            }

            // 生成文件名（带时间戳）
            const now = new Date();
            const timeStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
            
            // 1. Excel (.xlsx) 导出
            if (format === 'xlsx') {
                // 构造工作表数据
                const wsData = [
                    ['测试时间', 'MBTI类型', '动物人格', '人格描述'], // 表头
                    ...history.map(item => [
                        item.date,
                        item.mbti,
                        item.animal,
                        item.description.replace(/\n/g, ' ') // 移除换行符
                    ])
                ];

                // 创建工作表和工作簿
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'MBTI测试记录');

                // 调整列宽（优化显示）
                const wscols = [
                    { wch: 20 }, // 测试时间
                    { wch: 10 }, // MBTI类型
                    { wch: 10 }, // 动物人格
                    { wch: 80 }  // 人格描述
                ];
                ws['!cols'] = wscols;

                // 导出文件
                const fileName = `MBTI测试记录_${timeStr}.xlsx`;
                XLSX.writeFile(wb, fileName);
                
                // 提示成功
                alert(`✅ Excel文件导出成功！\n文件名为：${fileName}`);
            } 
            // 2. CSV (.csv) 导出
            else if (format === 'csv') {
                // 构造CSV内容
                const header = '测试时间,MBTI类型,动物人格,人格描述\n';
                let csvContent = header;
                history.forEach(item => {
                    // 转义特殊字符
                    const description = item.description.replace(/"/g, '""').replace(/\n/g, ' ');
                    const row = [
                        `"${item.date}"`,
                        `"${item.mbti}"`,
                        `"${item.animal}"`,
                        `"${description}"`
                    ].join(',') + '\n';
                    csvContent += row;
                });

                // 创建Blob（带BOM头解决中文乱码）
                const bom = '\uFEFF';
                const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                
                // 下载配置
                const fileName = `MBTI测试记录_${timeStr}.csv`;
                link.setAttribute('href', url);
                link.setAttribute('download', fileName);
                link.style.display = 'none';
                document.body.appendChild(link);
                
                // 触发下载
                link.click();
                
                // 清理资源
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                // 提示成功
                alert(`✅ CSV文件导出成功！\n文件名为：${fileName}`);
            }
        }
    </script>
</body>

</html>
